<strct-shell>
  <strct-header>
    <a class="brand" routerLink="/">
      <strct-icon name="hexagon" [size]="22" [strokeWidth]="1.4" />
      <div class="brand__text">
        <strong>UIStruct</strong>
        <span>Component Library</span>
      </div>
    </a>

    <span class="grow"></span>

    <a class="hnav" routerLink="/get-started">Get started</a>
    <a class="hnav" routerLink="/components/button">Components</a>

    <strct-theme-switcher />

    <a class="ghbtn" href="https://github.com/akcelik/uistruct" target="_blank" rel="noreferrer" aria-label="GitHub">
      <strct-icon name="code" [size]="16" />
    </a>
  </strct-header>

  @if (showSidebar()) {
    <strct-vertical-nav>
      <div class="side">
        <div class="rail">
          @for (group of groups; track group.id) {
            <strct-nav-item
              [active]="isActiveGroup(group.id)"
              [label]="group.label"
              [routerLink]="group.items[0].path"
            >
              <strct-icon [name]="group.icon" [size]="17" [strokeWidth]="1.4" />
            </strct-nav-item>
          }
        </div>

        <div class="panel">
          <div class="panel__title">{{ activeGroup().label }}</div>
          <nav class="panel__list">
            @for (item of activeGroup().items; track item.path) {
              <a
                class="panel__item"
                [class.is-active]="isActiveItem(item.path)"
                [routerLink]="item.path"
              >
                {{ item.label }}
              </a>
            }
          </nav>
        </div>
      </div>
    </strct-vertical-nav>
  }

  <main class="content" [class.content--wide]="!showSidebar()">
    <router-outlet />
  </main>

  <strct-footer>
    <span>UIStruct v0.3.0</span>
    <span class="dot-sep"></span>
    <span>{{ count }} components</span>
    <span class="grow"></span>
    <span>{{ themeLabel() }}</span>
  </strct-footer>
</strct-shell>

<strct-toast-outlet />
