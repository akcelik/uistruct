<strct-shell>
  <strct-header>
    <a class="brand" routerLink="/compute/default-appliance">
      <strct-icon name="hexagon" [size]="22" [strokeWidth]="1.4" />
      <div class="brand__text">
        <strong>UIStruct</strong>
        <span>Datacenter</span>
      </div>
    </a>

    <span class="grow"></span>

    <strct-theme-switcher />
  </strct-header>

  <strct-vertical-nav>
    <div class="side">
      <div class="rail">
        @for (group of groups; track group.id) {
          <strct-nav-item
            [active]="isActiveGroup(group.id)"
            [label]="group.label"
            [routerLink]="group.path"
          >
            <strct-icon [name]="group.icon" [size]="17" [strokeWidth]="1.4" />
          </strct-nav-item>
        }
      </div>
    </div>
  </strct-vertical-nav>

  <main class="content" [class.content--wide]="!showSidebar()">
    <router-outlet />
  </main>

  <strct-footer>
    <span>UIStruct v0.5.10</span>
    <span class="dot-sep"></span>
    <span>{{ groups.length }} categories</span>
    <span class="grow"></span>
    <span>{{ themeLabel() }}</span>
  </strct-footer>
</strct-shell>

<strct-toast-outlet />
